<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>টাকা নোট শনাক্তকারী</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@500;600;700;800&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans Bengali', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #064e3b 0%, #0b6e4f 30%, #0f9c63 55%, #0b6e4f 80%, #073b2c 100%);
    background-size: 300% 300%;
    animation: gradientShift 12s ease infinite;
  }

  @keyframes gradientShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .wave-layer {
    position: fixed;
    bottom: 0;
    left: 0;
    width: 200%;
    height: 220px;
    z-index: 0;
    opacity: 0.35;
  }
  .wave-layer svg { width: 100%; height: 100%; display: block; }
  .wave1 { animation: waveMove 18s linear infinite; }
  .wave2 { bottom: -10px; opacity: 0.22; animation: waveMove 26s linear infinite reverse; }
  .wave3 { bottom: -25px; opacity: 0.5; animation: waveMove 14s linear infinite; }

  @keyframes waveMove {
    0% { transform: translateX(0); }
    100% { transform: translateX(-50%); }
  }

  .card {
    background: #ffffff;
    border-radius: 24px;
    max-width: 480px;
    width: 100%;
    padding: 40px 32px;
    box-shadow: 0 25px 70px rgba(0,0,0,0.35);
    text-align: center;
    position: relative;
    z-index: 10;
  }
  .emblem-wrap { display: flex; justify-content: center; margin-bottom: 8px; }
  .piggy { font-size: 24px; }
  h1 {
    font-family: 'Baloo Da 2', 'Noto Sans Bengali', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: #0b6e4f;
    margin-bottom: 6px;
    line-height: 1.3;
  }
  p.subtitle {
    color: #666;
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 28px;
  }
  .upload-zone {
    border: 3px dashed #0b6e4f33;
    border-radius: 16px;
    padding: 32px 20px;
    cursor: pointer;
    transition: all 0.2s;
    background: #f7fdf9;
  }
  .upload-zone:hover, .upload-zone.dragover {
    border-color: #0b6e4f;
    background: #eefbf2;
  }
  .upload-zone .icon { font-size: 42px; margin-bottom: 10px; }
  .upload-zone p { color: #333; font-weight: 600; font-size: 16px; }
  .upload-zone span { color: #999; font-size: 13px; font-weight: 500; }
  input[type="file"] { display: none; }

  .preview-img {
    max-width: 100%;
    max-height: 220px;
    border-radius: 12px;
    margin: 20px 0;
    display: none;
    box-shadow: 0 6px 20px rgba(0,0,0,0.12);
  }

  .loading {
    display: none;
    margin: 30px 0;
  }
  .coin {
    font-size: 56px;
    display: inline-block;
    animation: spin 1s linear infinite;
  }
  @keyframes spin {
    0% { transform: rotateY(0deg); }
    100% { transform: rotateY(360deg); }
  }
  .loading p { margin-top: 14px; color: #0b6e4f; font-weight: 600; font-size: 16px; }

  .result {
    display: none;
    margin-top: 24px;
    padding: 24px;
    border-radius: 16px;
  }
  .result.success {
    background: #eefbf2;
    border: 2px solid #0b6e4f;
  }
  .result.fail {
    background: #fff4e5;
    border: 2px solid #e0a030;
  }
  .result .big-text {
    font-family: 'Baloo Da 2', 'Noto Sans Bengali', sans-serif;
    font-size: 25px;
    font-weight: 700;
    color: #0b6e4f;
    margin-bottom: 8px;
    line-height: 1.4;
  }
  .result.fail .big-text { color: #b8730a; font-size: 20px; }
  .result .confidence {
    font-size: 14px;
    font-weight: 500;
    color: #777;
    line-height: 1.6;
  }
  .try-again {
    margin-top: 20px;
    background: #0b6e4f;
    color: white;
    border: none;
    padding: 12px 28px;
    border-radius: 30px;
    font-family: 'Noto Sans Bengali', sans-serif;
    font-weight: 600;
    font-size: 15px;
    cursor: pointer;
    display: none;
  }
  .try-again:hover { background: #08573e; }
</style>
</head>
<body>

<div class="wave-layer wave1">
  <svg viewBox="0 0 1600 200" preserveAspectRatio="none">
    <path d="M0,100 Q200,40 400,100 T800,100 T1200,100 T1600,100 L1600,200 L0,200 Z" fill="#F42A41"/>
  </svg>
</div>
<div class="wave-layer wave2">
  <svg viewBox="0 0 1600 200" preserveAspectRatio="none">
    <path d="M0,110 Q200,160 400,110 T800,110 T1200,110 T1600,110 L1600,200 L0,200 Z" fill="#ffffff"/>
  </svg>
</div>
<div class="wave-layer wave3">
  <svg viewBox="0 0 1600 200" preserveAspectRatio="none">
    <path d="M0,120 Q200,70 400,120 T800,120 T1200,120 T1600,120 L1600,200 L0,200 Z" fill="#003d2a"/>
  </svg>
</div>

<div class="card">
  <div class="emblem-wrap">
    <svg viewBox="0 0 220 220" width="110" height="110">
      <circle cx="110" cy="110" r="95" fill="none" stroke="#006A4E" stroke-width="2.5"/>
      <text x="110" y="35" text-anchor="middle" font-size="14" fill="#006A4E">★ ★ ★ ★</text>
      <g stroke="#006A4E" stroke-width="1.5" fill="none">
        <path d="M25,110 Q15,90 25,70 M25,120 Q15,100 25,80 M25,130 Q15,110 25,90 M25,140 Q15,120 25,100 M25,150 Q15,130 25,110"/>
      </g>
      <g stroke="#006A4E" stroke-width="1.5" fill="none">
        <path d="M195,110 Q205,90 195,70 M195,120 Q205,100 195,80 M195,130 Q205,110 195,90 M195,140 Q205,120 195,100 M195,150 Q205,130 195,110"/>
      </g>
      <g transform="translate(110,120)">
        <path d="M0,150 Q 30,140, 60,150 T 120,150" stroke="#006A4E" stroke-width="3" fill="none" transform="translate(-60,-70)" opacity="0.7"/>
        <path d="M0,-70 C15,-40 15,-10 0,0 C-15,-10 -15,-40 0,-70 Z" fill="#006A4E"/>
        <path d="M0,-70 C15,-40 15,-10 0,0 C-15,-10 -15,-40 0,-70 Z" fill="#006A4E" transform="rotate(35)"/>
        <path d="M0,-70 C15,-40 15,-10 0,0 C-15,-10 -15,-40 0,-70 Z" fill="#006A4E" transform="rotate(70)"/>
        <path d="M0,-70 C15,-40 15,-10 0,0 C-15,-10 -15,-40 0,-70 Z" fill="#006A4E" transform="rotate(-35)"/>
        <path d="M0,-70 C15,-40 15,-10 0,0 C-15,-10 -15,-40 0,-70 Z" fill="#006A4E" transform="rotate(-70)"/>
        <path d="M0,-55 C10,-30 10,-8 0,0 C-10,-8 -10,-30 0,-55 Z" fill="#F42A41"/>
        <rect x="-4" y="0" width="8" height="18" fill="#006A4E"/>
      </g>
    </svg>
  </div>
  <h1>YOLOv11 ভিত্তিক বাংলাদেশি মুদ্রা শনাক্তকরণ সিস্টেম<span class="piggy"></span></h1>
  <p class="subtitle">একটি বাংলাদেশি ব্যাংক নোটের ছবি আপলোড করুন</p>

  <div class="upload-zone" id="uploadZone">
    <div class="icon">💵</div>
    <p>ছবি সিলেক্ট করতে ক্লিক করুন বা টেনে আনুন</p>
    <span>শুধুমাত্র JPEG অথবা PNG ফরম্যাট</span>
  </div>
  <input type="file" id="fileInput" accept="image/jpeg,image/png,image/jpg">

  <img class="preview-img" id="previewImg">

  <div class="loading" id="loading">
    <div class="coin">🪙</div>
    <p>নোট পড়া হচ্ছে...</p>
  </div>

  <div class="result" id="result">
    <div class="big-text" id="resultText"></div>
    <div class="confidence" id="resultConfidence"></div>
  </div>

  <button class="try-again" id="tryAgainBtn">আরেকটি ছবি চেষ্টা করুন</button>
</div>

<script>
  const KNOWN_DENOMINATIONS = "২, ৫, ১০, ২০, ৫০, ১০০, ৫০০, ১০০০";

  const uploadZone = document.getElementById('uploadZone');
  const fileInput = document.getElementById('fileInput');
  const previewImg = document.getElementById('previewImg');
  const loading = document.getElementById('loading');
  const result = document.getElementById('result');
  const resultText = document.getElementById('resultText');
  const resultConfidence = document.getElementById('resultConfidence');
  const tryAgainBtn = document.getElementById('tryAgainBtn');

  uploadZone.addEventListener('click', () => fileInput.click());

  uploadZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadZone.classList.add('dragover');
  });
  uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
  uploadZone.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      handleFile(e.dataTransfer.files[0]);
    }
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files.length) handleFile(fileInput.files[0]);
  });

  tryAgainBtn.addEventListener('click', () => {
    resetUI();
    fileInput.click();
  });

  function resetUI() {
    result.style.display = 'none';
    result.className = 'result';
    previewImg.style.display = 'none';
    tryAgainBtn.style.display = 'none';
    uploadZone.style.display = 'block';
  }

  async function handleFile(file) {
    previewImg.src = URL.createObjectURL(file);
    previewImg.style.display = 'block';
    uploadZone.style.display = 'none';
    result.style.display = 'none';
    loading.style.display = 'block';
    tryAgainBtn.style.display = 'none';

    const formData = new FormData();
    formData.append('file', file);

    try {
      const res = await fetch('/predict', { method: 'POST', body: formData });
      const data = await res.json();
      loading.style.display = 'none';

      if (!res.ok) {
        showFail("দুঃখিত, কিছু একটা ভুল হয়েছে। অন্য একটি ছবি দিয়ে চেষ্টা করুন।");
        return;
      }

      if (!data.recognized || data.detections.length === 0) {
        showFail("দুঃখিত, আমি এই নোটটি চিনতে পারিনি।");
        return;
      }

      const top = data.detections.reduce((a, b) => a.confidence > b.confidence ? a : b);
      showSuccess(top.denomination, top.confidence);

    } catch (err) {
      loading.style.display = 'none';
      showFail("সার্ভারের সাথে সংযোগ করা যায়নি। আবার চেষ্টা করুন।");
    }
  }

  function showSuccess(denomination, confidence) {
    result.className = 'result success';
    resultText.textContent = `আপনার নোটটি ${denomination} টাকা! 🎉`;
    resultConfidence.textContent = `নিশ্চয়তা: ${(confidence * 100).toFixed(1)}%`;
    result.style.display = 'block';
    tryAgainBtn.style.display = 'inline-block';
  }

  function showFail(message) {
    result.className = 'result fail';
    resultText.textContent = message;
    resultConfidence.textContent = `আমি শুধুমাত্র এই বাংলাদেশি টাকার নোটগুলো চিনতে পারি: ${KNOWN_DENOMINATIONS}। অনুগ্রহ করে এদের মধ্যে একটি নোট দিয়ে আবার চেষ্টা করুন।`;
    result.style.display = 'block';
    tryAgainBtn.style.display = 'inline-block';
  }
</script>

</body>
</html>
